workflows:
  ios-build:
    name: iPad Mirror iOS Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    working_directory: ipad-app
    environment:
      node: 20.19.4
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build unsigned IPA
        script: |
          npx expo prebuild --platform ios --no-install
          
          # Create broadcast extension directory
          mkdir -p ios/BroadcastExtension
          
          # Write SampleHandler.swift
          cat > ios/BroadcastExtension/SampleHandler.swift << 'EOF'
          import ReplayKit
          import Foundation

          class SampleHandler: RPBroadcastSampleHandler {
              var webSocket: URLSessionWebSocketTask?
              var session: URLSession?
              
              override func broadcastStarted(withSetupInfo setupInfo: [String : NSObject]?) {
                  session = URLSession(configuration: .default)
                  let url = URL(string: "ws://10.10.11.193:3000")!
                  webSocket = session?.webSocketTask(with: url)
                  webSocket?.resume()
                  let hello = "{\"type\":\"ipad-hello\"}"
                  webSocket?.send(.string(hello)) { _ in }
              }
              
              override func broadcastFinished() {
                  webSocket?.cancel()
              }
              
              override func processSampleBuffer(_ sampleBuffer: CMSampleBuffer, with sampleBufferType: RPSampleBufferType) {
                  guard sampleBufferType == .video else { return }
                  guard let imageBuffer = CMSampleBufferGetImageBuffer(sampleBuffer) else { return }
                  let ciImage = CIImage(cvPixelBuffer: imageBuffer)
                  let context = CIContext()
                  guard let cgImage = context.createCGImage(ciImage, from: ciImage.extent) else { return }
                  let uiImage = UIImage(cgImage: cgImage)
                  guard let jpegData = uiImage.jpegData(compressionQuality: 0.7) else { return }
                  let base64 = "data:image/jpeg;base64," + jpegData.base64EncodedString()
                  webSocket?.send(.string(base64)) { _ in }
              }
          }
          EOF
          
          # Write Info.plist for extension
          cat > ios/BroadcastExtension/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDisplayName</key>
              <string>iPad Mirror</string>
              <key>CFBundleExecutable</key>
              <string>$(EXECUTABLE_NAME)</string>
              <key>CFBundleIdentifier</key>
              <string>com.ipadmirror.app.broadcast</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>$(PRODUCT_NAME)</string>
              <key>CFBundlePackageType</key>
              <string>XPC!</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>NSExtension</key>
              <dict>
                  <key>NSExtensionPointIdentifier</key>
                  <string>com.apple.broadcast-services-upload</string>
                  <key>NSExtensionPrincipalClass</key>
                  <string>$(PRODUCT_MODULE_NAME).SampleHandler</string>
                  <key>RPBroadcastProcessMode</key>
                  <string>RPBroadcastProcessModeSampleBuffer</string>
              </dict>
          </dict>
          </plist>
          EOF
          
          xcodebuild -workspace ios/ipadapp.xcworkspace -scheme ipadapp -configuration Release -archivePath /Users/builder/clone/build/ipadapp.xcarchive archive CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
          mkdir -p /Users/builder/clone/build/ipa/Payload
          cp -r /Users/builder/clone/build/ipadapp.xcarchive/Products/Applications/ipadapp.app /Users/builder/clone/build/ipa/Payload/
          cd /Users/builder/clone/build/ipa
          zip -r ipadapp.ipa Payload
    artifacts:
      - /Users/builder/clone/build/ipa/ipadapp.ipa