workflows:
  ios-build:
    name: iPad Mirror iOS Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    working_directory: ipad-app
    environment:
      node: 20.19.4
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build unsigned IPA
        script: |
          npx expo prebuild --platform ios
          node scripts/create-extension.js
          node scripts/addextensiontarget.js
          python3 -c "
with open('ios/ipadapp.xcodeproj/project.pbxproj', 'r') as f:
    content = f.read()

content = content.replace(
    'SWIFT_VERSION = \"\";',
    'SWIFT_VERSION = 5.0;'
)

with open('ios/ipadapp.xcodeproj/project.pbxproj', 'w') as f:
    f.write(content)
print('Patched!')
"
          xcodebuild -workspace ios/ipadapp.xcworkspace -scheme ipadapp -configuration Release -archivePath /Users/builder/clone/build/ipadapp.xcarchive archive CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
          mkdir -p /Users/builder/clone/build/ipa/Payload
          cp -r /Users/builder/clone/build/ipadapp.xcarchive/Products/Applications/ipadapp.app /Users/builder/clone/build/ipa/Payload/
          cd /Users/builder/clone/build/ipa
          zip -r ipadapp.ipa Payload
    artifacts:
      - /Users/builder/clone/build/ipa/ipadapp.ipa