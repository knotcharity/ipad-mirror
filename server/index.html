<!DOCTYPE html>
<html>
<head>
    <title>iPad Mirror</title>
    <style>
        /* =======================================
           IPAD MIRROR - OBS DISPLAY PAGE
           This is what OBS will show on stream
        ======================================= */

        /* Make the background transparent for OBS */
        body {
            margin: 0;
            padding: 0;
            background: transparent;
        }

        /* Make the video fill the whole screen */
        canvas {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <canvas id="screen"></canvas>

    <script>
        // =======================================
        // IPAD MIRROR - OBS DISPLAY
        // Receives video frames and draws them
        // =======================================

        // ---- CONFIGURATION ----
        const SERVER_PORT = 3000; // must match server.js

        // ---- SETUP ----
        const canvas = document.getElementById('screen');
        const ctx = canvas.getContext('2d');

        // ---- CONNECT TO SERVER ----
        const ws = new WebSocket('ws://localhost:' + SERVER_PORT);

        ws.onopen = function() {
            console.log('[iPad Mirror] Connected to server!');
        };

        ws.onmessage = function(event) {
            // Draw the incoming video frame onto the canvas
            const img = new Image();
            img.onload = function() {
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
            };
            img.src = URL.createObjectURL(event.data);
        };

        ws.onclose = function() {
            console.log('[iPad Mirror] Disconnected from server.');
        };
    </script>

</body>
</html>
